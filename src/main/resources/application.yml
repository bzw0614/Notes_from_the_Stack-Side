spring:
  profiles:
    active: dev
  application:
    name: stackside-backend

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

stackside:
  jwt:
    secret: stackside-blog-secret-key-change-me-please-32bytes
    expiration-ms: 86400000
  article:
    view-count-sync-delay: 60000
